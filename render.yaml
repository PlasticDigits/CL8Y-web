services:
  - type: web
    name: CL8Y-web
    runtime: static
    buildCommand: yarn install --immutable && yarn build
    staticPublishPath: ./dist
    envVars:
      - key: SKIP_INSTALL_DEPS
        value: "true"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=6144"
      - key: NODE_VERSION
        value: "24"
